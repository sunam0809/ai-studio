services:
  - type: web
    name: ai-studio
    runtime: node
    plan: free
    buildCommand: >
      npm install -g pnpm &&
      pnpm install --no-frozen-lockfile &&
      pnpm --filter @workspace/api-spec run codegen &&
      pnpm --filter @workspace/api-server run build &&
      PORT=3 BASE_PATH=/ pnpm --filter @workspace/ai-studio run build &&
      cp -r artifacts/ai-studio/dist/public artifacts/api-server/dist/public
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        generateValue: false
        value: 10000
      - key: SESSION_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
